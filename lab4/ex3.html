<!DOCTYPE html>
<html>
<head><title>Exercise 2.1 (Lab ex 3)</title></head>
<body>
    <h2 id="title">Page Title</h2>

    <p class="info">First paragraph</p>
    <p class="info">Second paragraph</p>
    <p class="info">Third paragraph</p>

    <ul id="item-list">
        <li>Item A</li>
        <li>Item B</li>
        <li>Item C</li>
    </ul>

    <p id="display-count">Amount of list items :</p>

    <script>
        // Your code goes here

        // 1. Selecting Elements by id
        const heading = document.querySelector("#title");
        const paragraphs = document.querySelectorAll(".info");  // Return NodeList of
        const list = document.querySelectorAll(".item-list");

        const result = document.querySelector("#display-count");
        // 2, Modifying
        heading.innerHTML = "Hello, Cian!";

        // Loop and update paragraphs
        for (paragraph of paragraphs) {
            const current = paragraph.innerHTML;
            paragraph.innerHTML = current + " - updated";
        }

        // Count amount of list items
        let count = 0;
        for (item of list) {
            count++;
        }
        const countText = result.innerHTML;
        result.innerHTML = countText, count;
        console.log("Amount of items inside of list :", count);

    </script>
</body>
</html>
