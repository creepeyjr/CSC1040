<!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
    </head>
    <body>

        <h1>Cian's Trivia</h1>
        
        <h2 id="question"></h2>
        <ul id="options">

        </ul>
        <script>
            // Initial grab of question data
            fetch("https://opentdb.com/api.php?amount=5&type=multiple")
                .then(response => response.json())
                .then(data => {
                    // render data.results here
                    
                    // Grab text elements here
                    const questionElement = document.querySelector("#question");
                    const optionElement = document.querySelectorAll(".options");


                    // Change Page text to reflect a question
                    questionElement.innerHTML = data.results;
                })
                .catch(error => {
                    // display the error message here
                });

        </script>
    </body>
</html>
